site_name: Cleopatra
site_description: Visualization package
site_url: https://serapeum-org.github.io/cleopatra/
repo_url: https://github.com/serapeum-org/cleopatra
repo_name: serapeum-org/cleopatra

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - search.highlight
    - search.suggest
    - toc.follow
    - announce.dismiss
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-sunny
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-night
      name: Switch to system preference
  primary: indigo
  accent: indigo
  icon:
    repo: fontawesome/brands/github


plugins:
  - search
  - mkdocs-jupyter
  - autorefs
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
  - table-reader
  - tags
  - mike:
      # These fields are all optional; the defaults are as below...
      alias_type: symlink
      redirect_template: null
      deploy_prefix: ''
      canonical_version: null
      version_selector: true
      css_dir: css
      javascript_dir: js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: "#"
      toc_depth: 1-4
      anchorlink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Scope: scope.md
  - User Guide:
    - unstructured-mesh-guide.md
  - Reference:
    - Glyph (base): reference/glyph.md
    - Statistical plots: reference/statistics-glyph.md
    - ArrayGlyph: reference/array-glyph.md
    - MeshGlyph: reference/mesh-glyph.md
    - ScatterGlyph: reference/scatter-glyph.md
    - VectorGlyph: reference/vector-glyph.md
    - FlowGlyph: reference/flow-glyph.md
    - LineGlyph: reference/line-glyph.md
    - PolygonGlyph: reference/polygon-glyph.md
    - KDEGlyph: reference/kde-glyph.md
    - Tiles (basemaps): reference/tiles.md
    - Reference data (coastlines/relief): reference/reference-data.md
    - Projection (globe frames): reference/projection.md
    - Animations (save/embed): reference/animation.md
    - Colors: reference/colors-glyph.md
    - Styles: reference/styles-glyph.md
    - Config: reference/config.md
  - Examples:
    - ArrayGlyph: notebooks/array_glyph/array_glyph_examples.ipynb
    - ArrayGlyph RGB animation: notebooks/array_glyph/rgb_animation.ipynb
    - MeshGlyph: notebooks/mesh_glyph/mesh_glyph_examples.ipynb
    - ScatterGlyph: notebooks/scatter_glyph/scatter_glyph_examples.ipynb
    - VectorGlyph: notebooks/vector_glyph/vector_glyph_examples.ipynb
    - FlowGlyph: notebooks/flow_glyph/flow_glyph_examples.ipynb
    - LineGlyph: notebooks/line_glyph/line_glyph_examples.ipynb
    - PolygonGlyph: notebooks/polygon_glyph/polygon_glyph_examples.ipynb
    - KDEGlyph: notebooks/kde_glyph/kde_glyph_examples.ipynb
    - Statistics: notebooks/statistics/statistics_examples.ipynb
    - Colors: notebooks/colors/colors_examples.ipynb
    - Styles: notebooks/styles/styles_examples.ipynb
  - Change-log: change-log.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/serapeum-org/cleopatra
  version:
      provider: mike
  version_selector: true
